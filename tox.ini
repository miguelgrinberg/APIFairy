[tox]
skip_missing_interpreters=True

[testenv]
commands=
    pip install -e .
    pytest -p no:logging --cov=apifairy --cov-branch --cov-report=term-missing --cov-report=xml
deps=
    asgiref
    pytest
    pytest-cov
    openapi-spec-validator

[testenv:flake8]
deps=
    flake8
commands=
    flake8 --exclude=".*" src/apifairy tests

[testenv:docs]
changedir=docs
deps=
    sphinx
allowlist_externals=
    make
commands=
    make html
